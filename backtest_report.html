.tbl-wrap{background:#1e2130;border-radius:12px;overflow:auto;max-height:480px}
input[type=text]{background:#1a1d2e;border:1px solid #333;color:#eee;padding:7px 12px;border-radius:8px;font-size:13px;width:100%;margin-bottom:12px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}

// Top/Bot 股票条形图
function hbar(id, items, title) {
  new Chart(document.getElementById(id), {
    type: 'bar',
    data: {
      labels: items.map(s=>s.sym),
      datasets: [{
        label: title,
        data: items.map(s=>s.pnl),
        backgroundColor: items.map(s=>s.color),
      }]
    },
    options: {
      indexAxis:'y',
      plugins:{legend:{display:false},title:{display:true,text:title,color:'#aaa'}},
      scales:{x:{ticks:{color:'#666',callback:v=>'$'+v.toLocaleString()}},y:{ticks:{color:'#ccc'}}}
    }
  });
}
hbar('topChart', D.top_stocks, '盈利最多的股票');
hbar('botChart', [...D.bot_stocks].reverse(), '亏损最多的股票');

// 信号饼图
function donut(id, countObj, title) {
  const keys = Object.keys(countObj), vals = Object.values(countObj);
  const palette = ['#4ECDC4','#45B7D1','#FF6B6B','#FBBF24','#A78BFA','#F97316','#10B981','#EC4899','#6366F1','#84CC16'];
  new Chart(document.getElementById(id), {
    type: 'doughnut',
    data: {labels: keys, datasets:[{data: vals, backgroundColor: palette.slice(0,keys.length), borderWidth:0}]},
    options: {plugins:{legend:{position:'right',labels:{color:'#aaa',boxWidth:12}},title:{display:true,text:title,color:'#aaa'}}}
  });
}
donut('entryChart', D.signal_cnt,      '买入信号分布');
donut('exitChart',  D.sell_reason_cnt, '卖出原因分布');

// 交易明细表格
const tbody = document.getElementById('tradeBody');
function renderTable(rows) {
  tbody.innerHTML = '';
  rows.forEach(r => {
    const pnlCls = r.pnl >= 0 ? 'green' : 'red';
    const tag = `<span class="tag tag-${r.bucket}">${{conservative:'保守',longterm:'成长',shortterm:'短线'}[r.bucket]||r.bucket}</span>`;
    tbody.innerHTML += `<tr>
      <td>${r.date}</td>
      <td><b>${r.sym}</b></td>
      <td>${tag}</td>
      <td>${r.side}</td>
      <td>$${r.price}</td>
      <td>${r.qty}</td>
      <td class="${pnlCls}">${r.pnl >= 0 ? '+' : ''}$${r.pnl.toLocaleString()}</td>
      <td>${r.reason}</td>
    </tr>`;
  });
}
renderTable(D.trades);
document.getElementById('filterInput').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  renderTable(D.trades.filter(r =>
    r.sym.toLowerCase().includes(q) ||
    r.bucket.toLowerCase().includes(q) ||
    r.reason.toLowerCase().includes(q) ||
    r.side.toLowerCase().includes(q)
  ));
});
</script>
